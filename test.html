<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Slide-In Sidebar</title>
  <!-- Load Tailwind CSS for testing purposes -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Main Content & Trigger Button -->
  <div class="p-8">
    <h1 class="text-2xl font-bold mb-4">My Awesome App</h1>
    <button id="open-btn" class="px-4 py-2 bg-trasparent text-white rounded-lg shadow hover:bg-blue-700 transition">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#000000" hover:stroke="#FFFFFF" class="size-8">
  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
</svg>

    </button>
  </div>

  <!-- Backdrop Overlay (Optional but recommended for UX) -->
  <!-- 'hidden' keeps it invisible initially -->
  <div 
    id="backdrop" 
    class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity"
  ></div>

  <!-- Sidebar Container -->
  <!-- -translate-x-full hides it off-screen to the left -->
  <aside 
    id="sidebar" 
    class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 ease-in-out"
  >
    <!-- Sidebar Header -->
    <div class="flex items-center justify-between p-6 border-b">
      <h2 class="text-xl font-bold text-gray-800">Menu</h2>
      
      <!-- Close Button -->
      <button 
        id="close-btn" 
        class="text-gray-500 hover:text-gray-800 p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
      >
        <!-- X Icon from Heroicons -->
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Navigation Links -->
    <nav class="p-6 space-y-4">
      <a href="#" class="block text-gray-600 hover:text-blue-600 font-medium transition">Dashboard</a>
      <a href="#" class="block text-gray-600 hover:text-blue-600 font-medium transition">Settings</a>
      <a href="#" class="block text-gray-600 hover:text-blue-600 font-medium transition">Profile</a>
    </nav>
  </aside>

  <!-- JavaScript to handle toggling -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('backdrop');
    const openBtn = document.getElementById('open-btn');
    const closeBtn = document.getElementById('close-btn');

    // Function to slide the sidebar in
    function openSidebar() {
      // Remove the negative translation to slide it onto the screen
      sidebar.classList.remove('-translate-x-full');
      // Unhide the dark backdrop
      backdrop.classList.remove('hidden');
    }

    // Function to slide the sidebar out
    function closeSidebar() {
      // Add the negative translation back to push it off-screen
      sidebar.classList.add('-translate-x-full');
      // Hide the dark backdrop
      backdrop.classList.add('hidden');
    }

    // Attach click events
    openBtn.addEventListener('click', openSidebar);
    closeBtn.addEventListener('click', closeSidebar);
    
    // Clicking anywhere on the dark backdrop also closes the sidebar
    backdrop.addEventListener('click', closeSidebar);
  </script>

</body>
</html>
