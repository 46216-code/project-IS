<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>City Board</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body{
    background:#e2fcd4;
}
</style>
</head>

<body class="h-screen flex items-center justify-center p-4 overflow-hidden">

<!-- AUTH SCREEN -->
<div id="authScreen"
class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

<div class="text-center mb-6">
<h1 class="text-4xl font-black text-orange-500">
City Board
</h1>

<p id="authSubtitle" class="text-gray-500 mt-2">
ยินดีต้อนรับ! เข้าสู่ระบบ
</p>
</div>

<!-- LOGIN -->
<div id="loginFormContainer">

<form onsubmit="handleLogin(event)" class="space-y-4">

<input
id="authEmail"
type="email"
required
placeholder="Email"
class="w-full border-2 p-3 rounded-xl"
/>

<input
id="authPassword"
type="password"
required
placeholder="Password"
class="w-full border-2 p-3 rounded-xl"
/>

<button
id="loginBtn"
type="submit"
class="w-full bg-green-500 text-white p-3 rounded-xl font-bold">
เข้าสู่ระบบ
</button>

</form>

<p class="text-center mt-5 text-sm">
ยังไม่มีบัญชี?
<button
onclick="toggleAuthMode('signup')"
class="text-orange-500 font-bold">
สมัครสมาชิก
</button>
</p>

</div>

<!-- SIGNUP -->
<div id="signUpFormContainer" class="hidden">

<form
id="signUpForm"
onsubmit="handleSignUp(event)"
class="space-y-4">

<input
id="signUpEmail"
type="email"
required
placeholder="Email"
class="w-full border-2 p-3 rounded-xl"
/>

<input
id="signUpPass"
type="password"
required
placeholder="Password"
class="w-full border-2 p-3 rounded-xl"
/>

<input
id="profileImageFile"
type="file"
accept="image/*"
/>

<button
id="signUpBtn"
type="submit"
class="w-full bg-orange-500 text-white p-3 rounded-xl font-bold">
สมัครสมาชิก
</button>

</form>

<p class="text-center mt-5 text-sm">
มีบัญชีแล้ว?
<button
onclick="toggleAuthMode('login')"
class="text-green-600 font-bold">
เข้าสู่ระบบ
</button>
</p>

</div>
</div>

<!-- APP -->
<div id="appScreen"
class="hidden w-full max-w-6xl h-[90vh] bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col">

<!-- HEADER -->
<div class="bg-orange-500 text-white p-4 flex justify-between items-center">

<div class="flex items-center gap-3">
<h1 class="text-3xl font-black">
City Board
</h1>
</div>

<div class="flex items-center gap-3">

<button
onclick="openCreateModal()"
class="bg-green-500 px-5 py-2 rounded-full font-bold">
Create
</button>

<div class="flex items-center gap-2">

<img
id="userAvatar"
src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150"
class="w-10 h-10 rounded-full object-cover cursor-pointer"
onclick="handleLogout()"
/>

</div>
</div>
</div>

<!-- POSTS -->
<div
id="boardGrid"
class="flex-1 overflow-y-auto p-6 grid md:grid-cols-2 gap-5 bg-gray-100">

<div id="emptyState" class="text-center col-span-full py-20">

<h2 class="text-2xl font-bold text-gray-500">
ยังไม่มีโพสต์
</h2>

</div>

</div>

</div>

<!-- MODAL -->
<div
id="createModal"
class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center">

<div class="bg-white p-6 rounded-2xl w-full max-w-lg">

<div class="flex justify-between items-center mb-5">
<h2 class="text-2xl font-black">
สร้างโพสต์
</h2>

<button onclick="closeModal()">
✕
</button>
</div>

<form id="createPostForm"
onsubmit="handleCreatePost(event)"
class="space-y-4">

<input
id="postTitle"
required
placeholder="หัวข้อ"
class="w-full border-2 p-3 rounded-xl"
/>

<textarea
id="postDesc"
required
placeholder="รายละเอียด"
class="w-full border-2 p-3 rounded-xl"></textarea>

<select
id="postType"
class="w-full border-2 p-3 rounded-xl">

<option value="Cooperation">Cooperation</option>
<option value="Commission">Commission</option>
<option value="Volunteer">Volunteer</option>
<option value="Meet-up">Meet-up</option>

</select>

<input
id="postLimit"
type="number"
value="3"
class="w-full border-2 p-3 rounded-xl"
/>

<input
id="postImageFile"
type="file"
accept="image/*"
/>

<button
id="submitBtn"
type="submit"
class="w-full bg-green-500 text-white p-3 rounded-xl font-bold">
สร้างโพสต์
</button>

</form>

</div>
</div>

<script>

const SUPABASE_URL =
"https://vznmzjoouyxwosyrshzb.supabase.co";

const SUPABASE_ANON_KEY =
"PASTE_YOUR_REAL_ANON_KEY_HERE";

const supabase =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

let loggedInUser = null;
let postsSubscription = null;

const defaultPostImage =
"https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=500";

function toggleAuthMode(mode){

const login =
document.getElementById("loginFormContainer");

const signup =
document.getElementById("signUpFormContainer");

if(mode === "signup"){
    login.classList.add("hidden");
    signup.classList.remove("hidden");
}else{
    signup.classList.add("hidden");
    login.classList.remove("hidden");
}

}

async function handleSignUp(event){

event.preventDefault();

const email =
document.getElementById("signUpEmail").value;

const password =
document.getElementById("signUpPass").value;

const btn =
document.getElementById("signUpBtn");

btn.disabled = true;
btn.innerText = "กำลังสมัคร...";

const { data, error } =
await supabase.auth.signUp({
    email,
    password
});

if(error){
    alert(error.message);

    btn.disabled = false;
    btn.innerText = "สมัครสมาชิก";

    return;
}

alert("สมัครสมาชิกสำเร็จ");

document.getElementById("signUpForm").reset();

toggleAuthMode("login");

btn.disabled = false;
btn.innerText = "สมัครสมาชิก";

}

async function handleLogin(event){

event.preventDefault();

const email =
document.getElementById("authEmail").value;

const password =
document.getElementById("authPassword").value;

const btn =
document.getElementById("loginBtn");

btn.disabled = true;
btn.innerText = "กำลังเข้าสู่ระบบ...";

const { data, error } =
await supabase.auth.signInWithPassword({
    email,
    password
});

btn.disabled = false;
btn.innerText = "เข้าสู่ระบบ";

if(error){
    return alert(error.message);
}

loggedInUser = data.user;

showApp();

}

function showApp(){

document
.getElementById("authScreen")
.classList.add("hidden");

document
.getElementById("appScreen")
.classList.remove("hidden");

fetchPosts();

subscribePosts();

}

function subscribePosts(){

if(postsSubscription) return;

postsSubscription =
supabase
.channel("posts")
.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"posts"
},
() => {
fetchPosts();
}
)
.subscribe();

}

async function fetchPosts(){

const { data, error } =
await supabase
.from("posts")
.select("*")
.order("id",{ascending:false});

if(error){
console.error(error);
return;
}

const grid =
document.getElementById("boardGrid");

const empty =
document.getElementById("emptyState");

grid.querySelectorAll(".post-card")
.forEach(card => card.remove());

if(data.length === 0){
empty.classList.remove("hidden");
return;
}

empty.classList.add("hidden");

data.forEach(post => {

const div =
document.createElement("div");

div.className =
"post-card bg-white rounded-2xl overflow-hidden shadow";

div.innerHTML = `
<img
src="${post.image_url || defaultPostImage}"
class="w-full h-48 object-cover">

<div class="p-4">

<h3 class="font-black text-xl">
${post.title}
</h3>

<p class="text-gray-500 mt-2">
${post.description}
</p>

</div>
`;

grid.appendChild(div);

});

}

function openCreateModal(){

const modal =
document.getElementById("createModal");

modal.classList.remove("hidden");
modal.classList.add("flex");

}

function closeModal(){

const modal =
document.getElementById("createModal");

modal.classList.add("hidden");
modal.classList.remove("flex");

}

async function handleCreatePost(event){

event.preventDefault();

const title =
document.getElementById("postTitle").value;

const description =
document.getElementById("postDesc").value;

const type =
document.getElementById("postType").value;

const people_limit =
document.getElementById("postLimit").value;

const imageFile =
document.getElementById("postImageFile").files[0];

let image_url = null;

if(imageFile){

const filename =
`${Date.now()}_${imageFile.name}`;

const { error: uploadError } =
await supabase.storage
.from("activity-images")
.upload(`posts/${filename}`, imageFile);

if(!uploadError){

const { data } =
supabase.storage
.from("activity-images")
.getPublicUrl(`posts/${filename}`);

image_url = data.publicUrl;

}

}

const { error } =
await supabase
.from("posts")
.insert([{
title,
description,
type,
people_limit,
image_url,
status:"active",
user_id:loggedInUser.id
}]);

if(error){
return alert(error.message);
}

closeModal();

document
.getElementById("createPostForm")
.reset();

fetchPosts();

}

async function handleLogout(){

await supabase.auth.signOut();

location.reload();

}

window.onload = async () => {

const {
data:{session}
} =
await supabase.auth.getSession();

if(session?.user){

loggedInUser = session.user;

showApp();

}

};

</script>

</body>
</html>
