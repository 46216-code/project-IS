<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Board - บอร์ดกิจกรรมเมือง</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #e2fcd4; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ff9e59; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center overflow-hidden p-0 sm:p-4 md:p-6">

    <div id="appScreen" class="w-full max-w-10x2 h-full max-h-[90vh] bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col overflow-hidden">
        <header class="bg-[#ff7b23] p-4 flex flex-shrink-0 items-center justify-between gap-4 border-b-2 border-orange-600">
            <div class="flex items-center gap-2">
                <span class="bg-white text-[#ff7b23] font-bold p-1 px-2 rounded border border-black text-xl shadow-sm">CB</span>
                <h1 class="text-white text-3xl font-extrabold tracking-wide">City Board</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="openCreateModal()" class="bg-[#41cf43] text-white border-2 border-green-700 font-bold px-6 py-2 rounded-full hover:bg-green-600 transition shadow-md text-lg flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-plus"></i> Create (0/3)
                </button>
                
                <div class="flex items-center gap-2 border-l border-orange-400 pl-4">
                    <div class="text-right hidden sm:block">
                        <p id="userDisplay" class="text-white text-[22px] font-bold leading-[0.75]">User</p>
                        <span class="text-orange-200 text-xs">Online</span>
                    </div>
                    <div onclick="handleLogout()" title="ออกจากระบบ" class="w-11 h-11 rounded-full border-2 border-green-400 bg-gray-700 overflow-hidden cursor-pointer hover:opacity-80 transition shadow-sm">
                        <img id="userAvatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" alt="Profile" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </header>

        <div class="bg-[#ff9e59] p-3 flex flex-shrink-0 flex-wrap items-center justify-between gap-3 border-b border-orange-400">
            <div class="flex flex-wrap gap-2">
                <button class="bg-white/20 text-white px-4 py-1.5 rounded-full border border-white/40 font-semibold flex items-center gap-1 text-sm"><i class="fa-solid fa-filter"></i> Filter</button>
            </div>
            <button class="bg-[#ff7b23] text-white px-4 py-1.5 rounded-full border border-white/60 font-bold text-sm hover:bg-orange-600 transition cursor-pointer">How do I start?</button>
        </div>

        <main id="boardGrid" class="flex-1 overflow-y-auto p-6 bg-gray-50 grid grid-cols-1 md:grid-cols-2 gap-6 content-start">
            <div id="emptyState" class="col-span-full text-center py-20">
                <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-clipboard-list text-[#ff7b23] text-3xl"></i>
                </div>
                <p class="text-gray-700 text-xl font-bold">ยังไม่มีประกาศบนบอร์ดในขณะนี้</p>
                <p class="text-gray-400 text-sm mt-1">กดปุ่ม <span class="text-green-600 font-bold">Create</span> ด้านบนเพื่อสร้างกิจกรรมแรกของคุณ!</p>
            </div>
        </main>
    </div>

    <div id="createModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 relative shadow-2xl border-2 border-orange-400">
            <button onclick="closeModal('createModal')" class="absolute top-4 right-4 text-gray-400 hover:text-black text-2xl font-bold cursor-pointer">&times;</button>
            <h2 class="text-[#ff5100] text-2xl font-black mb-4 flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i> สร้างโพสต์ภารกิจใหม่</h2>

            <form id="createPostForm" onsubmit="handleCreatePost(event)" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-1">รูปภาพประกอบกิจกรรม</label>
                    <input type="file" id="postImageFile" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-1">หัวข้อกิจกรรม/งาน *</label>
                    <input type="text" id="postTitle" required placeholder="เช่น พาเดินเล่นสวนสาธารณะ..." class="w-full border-2 rounded-xl p-2.5 focus:outline-none focus:border-orange-400">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-1">รายละเอียดและข้อตกลงในการร่วมมือกัน *</label>
                    <textarea id="postDesc" required rows="3" placeholder="ระบุรายละเอียดงาน ทักษะ..." class="w-full border-2 rounded-xl p-2.5 focus:outline-none focus:border-orange-400"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">ประเภทกิจกรรม *</label>
                        <select id="postType" onchange="toggleTypeFields()" class="w-full border-2 rounded-xl p-2.5 focus:outline-none focus:border-orange-400 bg-white">
                            <option value="Cooperation">Cooperation (ร่วมมือทั่วไป)</option>
                            <option value="Commission">Commission $ (มีค่าตอบแทน)</option>
                            <option value="Volunteer">Volunteer (อาสาสมัคร)</option>
                            <option value="Meet-up">Meet-up (นัดรวมตัว)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">จำนวนคนที่ต้องการ *</label>
                        <input type="number" id="postLimit" min="1" value="3" required class="w-full border-2 rounded-xl p-2.5 focus:outline-none focus:border-orange-400">
                    </div>
                </div>
                <div id="commissionField" class="hidden">
                    <label class="block text-gray-700 text-sm font-bold mb-1">จำนวนเงินค่าตอบแทน ($)</label>
                    <input type="text" id="postBudget" placeholder="เช่น 500 บาท" class="w-full border-2 rounded-xl p-2.5 focus:outline-none focus:border-orange-400">
                </div>
                <div id="locationField" class="hidden">
                    <label class="block text-gray-700 text-sm font-bold mb-1">สถานที่นัดพบ *</label>
                    <input type="text" id="postLocation" placeholder="เช่น สวนลุมพินี ประตู 1" class="w-full border-2 rounded-xl p-2.5 focus:outline-none focus:border-orange-400">
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t">
                    <button type="button" onclick="closeModal('createModal')" class="bg-gray-300 text-gray-700 px-5 py-2 rounded-full font-bold hover:bg-gray-400 transition cursor-pointer">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="bg-[#41cf43] text-white border border-green-700 px-6 py-2 rounded-full font-bold hover:bg-green-600 transition shadow cursor-pointer">ประกาศลงบอร์ด</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
