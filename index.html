<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Board - บอร์ดกิจกรรมเมือง</title>

    <script>
        (function() {
            const supabaseStorageKey = "sb-vznmzjoouyxwosyrshzb-auth-token";
            const sessionJson = localStorage.getItem(supabaseStorageKey);
            const currentPage = window.location.pathname.split("/").pop().toLowerCase();
            
            // ถ้าไม่มี Session ค้างอยู่ และพยายามเข้าหน้าหลัก ให้ดีดไปหน้าล็อกอินทันที
            if (!sessionJson && (currentPage === "index.html" || currentPage === "index" || currentPage === "")) {
                window.location.replace("signup-login.html");
            }
        })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff; 
        }
        /* บังคับการสกรอลล์ในทุกบราว์เซอร์ด้วยสไตล์ที่ทันสมัย */
        .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: #fdba74 transparent;
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 9999px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #fdba74; }
    </style>
</head>
<body class="h-screen max-h-screen w-screen flex flex-col overflow-hidden bg-white text-gray-900 antialiased text-lg">

    <header class="w-full h-24 bg-gradient-to-r from-orange-50 to-orange-100/50 px-8 md:px-12 py-5 flex flex-shrink-0 items-center justify-between gap-6 border-b border-orange-200/60 z-20 shadow-sm">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined">
            menu
            </span> 
        </div>
        
        <div class="flex items-center gap-6">
            <button onclick="openCreateModal()" class="bg-gray-900 hover:bg-gray-800 text-white font-bold px-7 py-3.5 rounded-full transition-all duration-200 shadow-md hover:shadow-lg flex items-center gap-2.5 cursor-pointer active:scale-95 text-base flex-shrink-0">
                <i class="fa-solid fa-plus text-sm opacity-80"></i> Create
            </button>
            
            <div class="flex items-center gap-4 border-l-2 border-orange-200/60 pl-6 flex-shrink-0">
                <div class="text-right hidden sm:block">
                    <p id="userDisplay" class="text-orange-950 font-bold text-base tracking-tight">User</p>
                    <span class="flex items-center justify-end gap-2 text-emerald-600 text-xs font-bold">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Online
                    </span>
                </div>
                
                <div onclick="handleLogout()" title="ออกจากระบบ" class="w-12 h-12 rounded-full bg-[#cbd5e1] flex items-end justify-center cursor-pointer transition-all duration-200 shadow-md active:scale-95 overflow-hidden border border-orange-200/40 hover:bg-[#b8c2cc] flex-shrink-0">
                    <i class="fa-solid fa-user text-white text-3xl translate-y-1"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="w-full bg-white px-8 md:px-12 py-4 flex flex-shrink-0 items-center justify-between gap-4 border-b border-gray-100 z-30 relative">
        <div class="flex gap-3 relative z-30">
            <button id="filterBtn" onclick="toggleFilterMenu()" class="bg-orange-400 hover:bg-orange-500 text-white px-6 py-2.5 rounded-full shadow-md shadow-orange-500/10 font-bold flex items-center gap-2.5 text-sm transition-all active:scale-95 cursor-pointer relative z-30">
                <i class="fa-solid fa-filter text-white/90 text-xs"></i> Filter: All
            </button>
        </div>
        <button onclick="openHowToStart()" class="bg-orange-50 hover:bg-orange-100 text-orange-600 px-5 py-2 rounded-full font-bold text-sm transition-all duration-150 cursor-pointer">
            How do I start?
        </button>
    </div>

    <div class="flex-1 min-h-0 w-full overflow-y-auto bg-[#fafafa] custom-scroll z-10">
        <main id="boardGrid" class="p-8 md:p-12 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 content-start w-full">
            
            <div id="emptyState" class="col-span-full text-center py-40 px-6 flex flex-col items-center justify-center">
                <div class="w-20 h-20 bg-orange-50 border border-orange-100 rounded-3xl flex items-center justify-center shadow-sm mb-6 text-orange-400">
                    <i class="fa-solid fa-clipboard-list text-3xl"></i>
                </div>
                <p class="text-gray-900 text-2xl font-extrabold">ยังไม่มีประกาศบนบอร์ดในขณะนี้</p>
                <p class="text-gray-400 text-sm mt-2 max-w-sm leading-relaxed">กดปุ่ม <span class="text-orange-400 font-bold">Create</span> ด้านบนเพื่อสร้างกิจกรรมแรกของคุณ!</p>
            </div>
            
        </main>
    </div>

    <div id="createModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md hidden flex items-center justify-center p-6 z-50 transition-all duration-300">
        <div class="bg-white rounded-[32px] max-w-xl w-full p-8 md:p-10 shadow-[0_30px_70px_rgba(0,0,0,0.15)] border border-gray-100 relative transform transition-all max-h-[90vh] overflow-y-auto custom-scroll">
            <button onclick="closeModal('createModal')" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 text-2xl font-bold cursor-pointer transition-colors">&times;</button>
            
            <h2 class="text-gray-900 text-2xl font-extrabold mb-6 flex items-center gap-3">
                <span class="w-10 h-10 bg-orange-50 text-orange-400 rounded-xl flex items-center justify-center text-lg shadow-sm">
                    <i class="fa-solid fa-plus-circle"></i>
                </span>
                สร้างโพสต์ภารกิจใหม่
            </h2>

            <form id="createPostForm" class="space-y-5 text-sm">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">รูปภาพประกอบกิจกรรม</label>
                    <div class="w-full border-2 border-dashed border-orange-100 rounded-2xl p-4 hover:border-orange-300 transition-colors bg-orange-50/10">
                        <input type="file" id="postImageFile" accept="image/*" class="w-full text-gray-500 file:mr-4 file:py-2 file:px-5 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-gray-900 file:text-white hover:file:bg-gray-800 cursor-pointer">
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-700 font-bold mb-2">หัวข้อกิจกรรม/งาน *</label>
                    <input type="text" id="postTitle" required placeholder="เช่น พาเดินเล่นสวนสาธารณะ..." class="w-full border border-gray-200 rounded-2xl p-3.5 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-400/10 transition-all bg-white text-base">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-bold mb-2">รายละเอียดและข้อตกลงในการร่วมมือกัน *</label>
                    <textarea id="postDesc" required rows="3" placeholder="ระบุรายละเอียดงาน ทักษะ..." class="w-full border border-gray-200 rounded-2xl p-3.5 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-400/10 transition-all bg-white text-base"></textarea>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">ประเภทกิจกรรม *</label>
                        <div class="relative">
                            <select id="postType" onchange="toggleTypeFields()" class="w-full border border-gray-200 rounded-2xl p-3.5 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-400/10 transition-all bg-white appearance-none text-base cursor-pointer">
                                <option value="Cooperation">Cooperation (ร่วมมือทั่วไป)</option>
                                <option value="Commission">Commission $ (มีค่าตอบแทน)</option>
                                <option value="Volunteer">Volunteer (อาสาสมัคร)</option>
                                <option value="Meet-up">Meet-up (นัดรวมตัว)</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">จำนวนคนที่ต้องการ *</label>
                        <input type="number" id="postLimit" min="1" value="3" required class="w-full border border-gray-200 rounded-2xl p-3.5 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-400/10 transition-all bg-white text-base">
                    </div>
                </div>
                
                <div id="commissionField" class="hidden">
                    <label class="block text-gray-700 font-bold mb-2">จำนวนเงินค่าตอบแทน ($)</label>
                    <input type="text" id="postBudget" placeholder="เช่น 500 บาท" class="w-full border border-gray-200 rounded-2xl p-3.5 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-400/10 transition-all bg-white text-base">
                </div>
                
                <div id="locationField" class="hidden">
                    <label class="block text-gray-700 font-bold mb-2">สถานที่นัดพบ *</label>
                    <input type="text" id="postLocation" placeholder="เช่น สวนลุมพินี ประตู 1" class="w-full border border-gray-200 rounded-2xl p-3.5 focus:outline-none focus:border-orange-400 focus:ring-4 focus:ring-orange-400/10 transition-all bg-white text-base">
                </div>
                
                <div class="flex justify-end gap-3 pt-6 border-t border-gray-100">
                    <button type="button" onclick="closeModal('createModal')" class="bg-gray-100 text-gray-600 px-6 py-3 rounded-full font-bold hover:bg-gray-200 transition-colors cursor-pointer text-base">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-7 py-3 rounded-full font-bold transition-all shadow-sm shadow-emerald-500/10 active:scale-95 cursor-pointer text-base">ประกาศลงบอร์ด</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailsModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md hidden flex items-center justify-center p-6 z-50 transition-all duration-300">
        <div class="bg-white rounded-[32px] max-w-2xl w-full overflow-hidden shadow-[0_30px_70px_rgba(0,0,0,0.15)] border border-gray-100 relative transform transition-all">
            <button onclick="closeModal('detailsModal')" class="absolute top-5 right-5 text-gray-500 hover:text-gray-800 bg-white/90 backdrop-blur-md hover:bg-white w-10 h-10 rounded-full flex items-center justify-center text-lg font-bold z-10 transition shadow-md border border-gray-100">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <div class="relative h-72 bg-gray-100">
                <img id="modalImage" class="w-full h-full object-cover" src="" alt="Activity Banner">
                <div class="absolute inset-0 bg-gradient-to-t from-gray-950/80 via-gray-950/20 to-transparent"></div>
                <div class="absolute bottom-6 left-8 right-8">
                    <span class="inline-block bg-orange-400 text-white font-bold tracking-wide uppercase text-xs px-3 py-1.5 rounded-lg mb-3 shadow-md shadow-orange-500/10">Active Event</span>
                    <h2 id="modalTitle" class="text-white text-3xl font-extrabold tracking-tight drop-shadow-sm"></h2>
                </div>
            </div>

            <div class="p-8 md:p-10">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">รายละเอียดกิจกรรม</h3>
                <p id="modalDesc" class="text-gray-600 text-base leading-relaxed whitespace-pre-line"></p>

                <div class="mt-10 pt-6 border-t border-gray-100 flex items-center justify-between">
                    <span class="text-sm text-gray-400 font-semibold"><i class="fa-regular fa-clock mr-1.5"></i> เปิดรับสมัครสมาชิก</span>
                    <button onclick="openConfirmModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3.5 rounded-full font-bold text-base transition-all duration-200 shadow-md shadow-emerald-500/10 active:scale-95 flex items-center gap-2.5 cursor-pointer">
                        <i class="fa-solid fa-arrow-right-to-bracket text-sm opacity-90"></i> สมัครเข้าร่วม
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-md hidden flex items-center justify-center p-6 z-50 transition-all duration-300">
        <div class="bg-white rounded-[32px] w-full max-w-md overflow-hidden shadow-[0_30px_70px_rgba(0,0,0,0.15)] border border-gray-100 relative transform transition-all p-8 text-center">
            <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-5 border border-emerald-100">
                <i class="fa-solid fa-circle-check text-2xl"></i>
            </div>

            <h3 class="font-extrabold text-2xl text-gray-900 tracking-tight">ยืนยันการสมัคร</h3>
            <p class="text-gray-400 text-sm mt-1.5">กรุณาตรวจสอบชื่อกิจกรรมให้ถี่ถ้วนก่อนกดยืนยัน</p>

            <div class="my-6 p-4 bg-gray-50 rounded-2xl border border-gray-100 flex items-center gap-4 text-left">
                <img id="confirmImage" class="w-16 h-16 rounded-xl object-cover flex-shrink-0" src="" alt="Thumbnail">
                <p id="confirmTitle" class="font-bold text-sm text-gray-800 line-clamp-2 leading-snug"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="closeModal('confirmModal')" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-5 py-3 rounded-full transition font-bold text-sm cursor-pointer">ยกเลิก</button>
                <button onclick="submitApplication()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-3 rounded-full transition font-bold text-sm shadow-md shadow-emerald-500/10 active:scale-95 cursor-pointer">ยืนยัน</button>
            </div>
        </div>
    </div>
    <div id="ownerWarningModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-[32px] max-w-sm w-full  relative transform transition-all p-8 text-center animate-fade-in">
        <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-3xl flex items-center justify-center mx-auto mb-5 border border-orange-100">
            <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
        </div>

        <h3 class="font-extrabold text-2xl text-gray-900 tracking-tight">It's your own post!</h3>
       
        <div class="mt-8">
            <button onclick="closeModal('ownerWarningModal')" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold px-6 py-3.5 rounded-2xl transition cursor-pointer active:scale-98 shadow-md">
                 Close
            </button>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
