                        .from('activity-images')
                        .getPublicUrl(filePath);

                    imageUrl = urlData.publicUrl;

);

async function handleLogin(event){

const email =
document.getElementById("authEmail").value;

const password =
document.getElementById("authPassword").value;

document.getElementById("loginBtn");

btn.disabled = true;

await supabase.auth.signInWithPassword({
    email,
    password
});

btn.disabled = false;
btn.innerText = "เข้าสู่ระบบ";

if(error){
    return alert(error.message);
}

showApp();

function showApp(){

document
.getElementById("authScreen")
.classList.add("hidden");

document
.getElementById("appScreen")
.classList.remove("hidden");

fetchPosts();

subscribePosts();

}

function subscribePosts(){

if(postsSubscription) return;

postsSubscription =
supabase
.channel("posts")
.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"posts"
},
() => {
fetchPosts();
}
)
.subscribe();

}

async function fetchPosts(){

const { data, error } =
await supabase
.from("posts")
.select("*")
.order("id",{ascending:false});

if(error){
console.error(error);
return;
}

const grid =
document.getElementById("boardGrid");

const empty =
document.getElementById("emptyState");

grid.querySelectorAll(".post-card")
.forEach(card => card.remove());

if(data.length === 0){
empty.classList.remove("hidden");
return;
}

empty.classList.add("hidden");

data.forEach(post => {

const div =
document.createElement("div");

div.className =
"post-card bg-white rounded-2xl overflow-hidden shadow";

div.innerHTML = `
<img
src="${post.image_url || defaultPostImage}"
class="w-full h-48 object-cover">

<div class="p-4">

<h3 class="font-black text-xl">
${post.title}
</h3>

<p class="text-gray-500 mt-2">
${post.description}
</p>

</div>
`;

grid.appendChild(div);

});

}

function openCreateModal(){

const modal =
document.getElementById("createModal");

modal.classList.remove("hidden");
modal.classList.add("flex");

}

function closeModal(){

const modal =
document.getElementById("createModal");

modal.classList.add("hidden");
modal.classList.remove("flex");

}

async function handleCreatePost(event){

event.preventDefault();

const title =
document.getElementById("postTitle").value;

const description =
document.getElementById("postDesc").value;

const type =
document.getElementById("postType").value;

const people_limit =
document.getElementById("postLimit").value;

const imageFile =
document.getElementById("postImageFile").files[0];

let image_url = null;

if(imageFile){

const filename =
`${Date.now()}_${imageFile.name}`;

const { error: uploadError } =
await supabase.storage
.from("activity-images")
.upload(`posts/${filename}`, imageFile);

if(!uploadError){

const { data } =
supabase.storage
.from("activity-images")
.getPublicUrl(`posts/${filename}`);

image_url = data.publicUrl;

}

}

const { error } =
await supabase
.from("posts")
.insert([{
title,
description,
type,
people_limit,
image_url,
status:"active",
user_id:loggedInUser.id
}]);

if(error){
return alert(error.message);
}

closeModal();

document
.getElementById("createPostForm")
.reset();

fetchPosts();

}

async function handleLogout(){

await supabase.auth.signOut();

location.reload();

}

window.onload = async () => {

const {
data:{session}
} =
await supabase.auth.getSession();

if(session?.user){

loggedInUser = session.user;

showApp();

}

};

</script>
